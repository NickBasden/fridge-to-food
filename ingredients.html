<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="ingredients.css">
        <title>Your Ingredients — Fridge to Food</title>
    </head>
    <body class="app-body">
        <header class="app-header">
            <a href="index.html" class="logo">🥗 Fridge to Food</a>
        </header>

        <main class="app-main">
            <div class="page-card">
                <div class="page-heading">
                    <h2>What's in your fridge?</h2>
                    <p>Add ingredients and we'll find recipes you can make right now.</p>
                </div>

                <div class="input-row">
                    <input
                        type="text"
                        id="ingredient-input"
                        class="ingredient-input"
                        placeholder="e.g. chicken, garlic, spinach…"
                        autocomplete="off"
                    />
                    <button class="add-btn" onclick="addIngredient()">Add</button>
                </div>

                <div id="suggestions" class="suggestions hidden"></div>

                <ul id="ingredient-list" class="ingredient-list"></ul>

                <div id="empty-state" class="empty-state">
                    <span>🧺</span>
                    <p>No ingredients yet — add a few above to get started.</p>
                </div>

                <button class="cta-button find-btn" id="find-btn" onclick="findRecipes()" disabled>
                    Find Recipes →
                </button>
            </div>
        </main>

        <script src="ingredients.js"></script>
    </body>
</html>
